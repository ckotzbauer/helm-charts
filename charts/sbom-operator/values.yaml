# Default values for sbom-operator.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

image:
  repository: ghcr.io/ckotzbauer/sbom-operator
  tag: "0.43.7@sha256:df5d76cd7b91568b57515563e310f927d948264d68135dbf94f89969463416dd"
  pullPolicy: IfNotPresent
  pullSecrets: []

args: {}

envVars: []

jobImageMode: false

podAnnotations: {}

priorityClassName: ""

resources: {}
#  requests:
#    cpu: 100m
#    memory: 100Mi
#  limits:
#    cpu: 500m
#    memory: 1Gi

podSecurityContext: {}

securityContext:
  privileged: false
  runAsUser: 1001
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop:
      - ALL

serviceAccount:
  # Specifies whether a ServiceAccount should be created
  create: true

  # The name of the ServiceAccount to use.
  # If not set and create is true, a name is generated using the fullname template
  name:

nodeSelector: {}

tolerations: []

affinity: {}

extraVolumes: []

extraVolumeMounts: []
