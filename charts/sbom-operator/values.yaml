# Default values for sbom-operator.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

image:
  repository: ghcr.io/ckotzbauer/sbom-operator
  tag: "0.42.1@sha256:09dc8f027154fa7b0d081decab7f185fe51f8bc536b7b42e6a298e4e33bc890b"
  pullPolicy: IfNotPresent
  pullSecrets: []

args: {}

envVars: []

jobImageMode: false

podAnnotations: {}

priorityClassName: ""

resources: {}
#  requests:
#    cpu: 500m
#    memory: 1Gi
#  limits:
#    cpu: 100m
#    memory: 100Mi

podSecurityContext: {}

securityContext:
  privileged: false
  runAsUser: 1001
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop:
      - ALL

serviceAccount:
  # Specifies whether a ServiceAccount should be created
  create: true

  # The name of the ServiceAccount to use.
  # If not set and create is true, a name is generated using the fullname template
  name:

nodeSelector: {}

tolerations: []

affinity: {}

extraVolumes: []

extraVolumeMounts: []
