name: label-issues
on:
  issue_comment:
    types:
      - created
      - edited
  pull_request:
    types:
      - opened
  issues:
    types:
      - opened

jobs:
  label-issues:
    uses: ckotzbauer/actions-toolkit/.github/workflows/toolkit-label-issues.yml@9e2a560f6c957fe29a2a78f8cbadabeea56a8c73 # 0.52.0
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}

